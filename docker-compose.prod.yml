# Production stack. Run with an explicit env file:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Unlike docker-compose.yml there are no bind mounts of the code, no Vite dev
# server and no hardcoded secrets: everything sensitive comes from .env.production.

x-app: &app-base
  image: ticketera-prod:latest
  build:
    context: .
    dockerfile: Dockerfile.prod
  restart: unless-stopped
  env_file:
    - .env.production
  depends_on:
    mariadb:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  mariadb:
    image: mariadb:10.11
    container_name: ticketera-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD requerido}
      MARIADB_DATABASE: ${DB_DATABASE:-ticketera}
      MARIADB_USER: ${DB_USERNAME:-ticketera}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
    volumes:
      - ticketera-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ticketera-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ticketera-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    <<: *app-base
    container_name: ticketera-app
    environment:
      RUN_MIGRATIONS: "true"
    expose:
      - "9000"
    volumes:
      - ticketera-public:/var/www/html/public
      - ticketera-storage:/var/www/html/storage/app
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: ticketera-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ticketera-public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5

  queue:
    <<: *app-base
    container_name: ticketera-queue
    volumes:
      - ticketera-storage:/var/www/html/storage/app
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f queue:work > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    <<: *app-base
    container_name: ticketera-scheduler
    volumes:
      - ticketera-storage:/var/www/html/storage/app
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: php artisan schedule:work
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f schedule:work > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup:
    image: mariadb:10.11
    container_name: ticketera-backup
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_DATABASE: ${DB_DATABASE:-ticketera}
      DB_USERNAME: ${DB_USERNAME:-ticketera}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
    entrypoint: ["sh", "/usr/local/bin/backup.sh"]
    volumes:
      - ./docker/backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ticketera-backups:/backups
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  ticketera-db:
  ticketera-redis:
  ticketera-public:
  ticketera-storage:
  ticketera-backups:
