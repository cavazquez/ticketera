name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Calidad y tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: secret
          MARIADB_DATABASE: ticketera
          MARIADB_USER: ticketera
          MARIADB_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ticketera
      DB_USERNAME: ticketera
      DB_PASSWORD: secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, pdo_mysql, ldap, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Composer validate
        run: composer validate --strict --no-check-publish

      - name: Composer audit
        run: composer audit

      - name: Laravel Pint
        run: ./vendor/bin/pint --test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Rector
        run: ./vendor/bin/rector process --dry-run

      - name: Laravel sanity checks
        run: |
          php artisan config:clear --ansi
          php artisan route:list --except-vendor

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: PHPUnit
        run: php artisan test

      - name: npm audit
        run: npm audit --audit-level=high

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Vite build
        run: npm run build
