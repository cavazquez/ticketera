; Production PHP-FPM pool. Runs as www-data and keeps the container environment
; so Docker-provided variables (DB, Redis, etc.) reach PHP.
[www]
user = www-data
group = www-data

listen = 9000

clear_env = no
catch_workers_output = yes
decorate_workers_output = no

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

ping.path = /ping
pm.status_path = /status
