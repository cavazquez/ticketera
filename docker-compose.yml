services:
  mariadb:
    image: mariadb:10.11
    container_name: ticketera-mariadb
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: ticketera
      MARIADB_USER: ticketera
      MARIADB_PASSWORD: secret
    volumes:
      - ticketera-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ticketera-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: ticketera-app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    expose:
      - "9000"
    volumes:
      - .:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &app-env
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ticketera
      DB_USERNAME: ticketera
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      APP_URL: http://127.0.0.1:8000
      VITE_DEV_SERVER_URL: http://localhost:5173

  nginx:
    image: nginx:1.27-alpine
    container_name: ticketera-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    build: .
    container_name: ticketera-queue
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - .:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600

  scheduler:
    build: .
    container_name: ticketera-scheduler
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - .:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    command: php artisan schedule:work

  vite:
    image: node:24-alpine
    container_name: ticketera-vite
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - ticketera-node-modules:/var/www/html/node_modules
    environment:
      APP_URL: http://127.0.0.1:8000
      VITE_DEV_SERVER_URL: http://localhost:5173
    command: sh -c "npm install && npm run dev"
    depends_on:
      - nginx

volumes:
  ticketera-db:
  ticketera-node-modules:
